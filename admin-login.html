<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Admin Sign In — Cadence</title>
<meta name="theme-color" content="#312E81">
<link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/icon-16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../public/styles.css">
</head>
<body class="auth-body">

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-mark"><img src="assets/icon-512.png" alt=""></div>
      <div class="brand-text">
        <span class="brand-name">Cadence</span>
        <span class="brand-sub">Super Admin Console</span>
      </div>
    </div>

    <div id="authMessage" class="auth-message hidden"></div>

    <form id="adminLoginForm" class="booking-form">
      <label class="form-label">Admin email
        <input type="email" id="adminEmail" class="form-input" placeholder="admin@yourcompany.com" required autocomplete="username">
      </label>
      <label class="form-label">Password
        <input type="password" id="adminPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary btn-block" id="adminLoginBtn">Sign In</button>
    </form>

    <p class="auth-footnote">This console is restricted to authorized super-admin accounts only. Business owners and staff should sign in at the regular staff login page.</p>
  </div>
</div>

<script type="module" src="admin-login.js"></script>
</body>
</html>
